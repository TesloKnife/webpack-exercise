<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather Sound</title>
  </head>
  <body>
    <div class="container">
      <h1 class="title">Weather Sound</h1>
      <div class="weather-cards">
        <!-- Карточка "Лето" -->
        <button
          class="weather-card"
          data-weather="summer"
          aria-label="Летняя погода"
        >
          <img src="./assets/summer-bg.jpg" alt="Лето" class="weather-image" />
          <div class="weather-icon">
            <img src="./assets/icons/sun.svg" alt="Солнце" class="icon-svg" />
          </div>
          <!-- Иконка паузы (скрыта по умолчанию) -->
          <div class="pause-icon hidden">
            <img src="./assets/icons/pause.svg" alt="Пауза" class="icon-svg" />
          </div>
        </button>

        <!-- Карточка "Дождь" -->
        <button
          class="weather-card"
          data-weather="rainy"
          aria-label="Дождливая погода"
        >
          <img src="./assets/rainy-bg.jpg" alt="Дождь" class="weather-image" />
          <div class="weather-icon">
            <img
              src="./assets/icons/cloud-rain.svg"
              alt="Дождь"
              class="icon-svg"
            />
          </div>
          <div class="pause-icon hidden">
            <img src="./assets/icons/pause.svg" alt="Пауза" class="icon-svg" />
          </div>
        </button>

        <!-- Карточка "Зима" -->
        <button
          class="weather-card"
          data-weather="winter"
          aria-label="Зимняя погода"
        >
          <img src="./assets/winter-bg.jpg" alt="Зима" class="weather-image" />
          <div class="weather-icon">
            <img
              src="./assets/icons/cloud-snow.svg"
              alt="Снег"
              class="icon-svg"
            />
          </div>
          <div class="pause-icon hidden">
            <img src="./assets/icons/pause.svg" alt="Пауза" class="icon-svg" />
          </div>
        </button>
      </div>

      <!-- Контейнер управления громкостью -->
      <div class="volume-control">
        <label for="volume-slider" class="volume-label">Громкость</label>
        <input
          type="range"
          id="volume-slider"
          class="volume-slider"
          min="0"
          max="100"
          value="50"
        />
        <span class="volume-value">50%</span>
      </div>
    </div>
  </body>
</html>
